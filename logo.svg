<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 400 220"
     width="100%"
     height="auto"
     preserveAspectRatio="xMidYMid meet">

  <!-- Word -->
  <text x="200" y="70"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="64"
        font-weight="700"
        fill="#111">
    Word
  </text>

  <!-- of the -->
  <text x="200" y="115"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="36"
        font-weight="500"
        fill="#111">
    of the
  </text>

  <!-- Day -->
  <text x="200" y="170"
        text-anchor="middle"
        font-family="Georgia, serif"
        font-size="64"
        font-weight="700"
        fill="#111">
    Day
  </text>

  <!-- Colour Blocks -->
  <rect x="140" y="185" width="35" height="35" fill="#0f5b4f"/>
  <rect x="182" y="185" width="35" height="35" fill="#e33c2d"/>
  <rect x="224" y="185" width="35" height="35" fill="#8f8f8f"/>

</svg>
